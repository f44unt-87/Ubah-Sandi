<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Premium - MASDABIYANET</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle, #231810 0%, #110905 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.15);
            width: 380px;
            text-align: center;
            position: relative;
        }

        /* --- TULISAN 3D ELEGAN --- */
        h1 {
            font-size: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            margin-top: 0;
            
            /* Warna Dasar Emas Premium */
            color: #dcb05e;
            
            /* Efek 3D Timbul & Elegan (Trik Text-Shadow) */
            text-shadow: 
                0 1px 0 #b18e47, /* Sisi Timbul */
                0 2px 0 #9c7c3d, /* Sisi Timbul yang Lebih Dalam */
                0 3px 0 #896a33, /* Sisi Timbul Terdalam */
                0 4px 0 #75592a, /* Shadow Terdalam Logam */
                0 6px 1px rgba(0,0,0,0.1), /* Bayangan Timbul Tipis */
                0 0 5px rgba(0,0,0,0.2),  /* Bayangan Tipis Halus */
                0 1px 3px rgba(0,0,0,0.3), /* Bayangan Jatuh Halus */
                0 3px 5px rgba(0,0,0,0.2), /* Bayangan Jatuh Sedang */
                0 5px 10px rgba(0,0,0,0.25), /* Bayangan Jatuh Jauh */
                0 10px 10px rgba(0,0,0,0.2); /* Bayangan Jatuh Terdalam */

            /* Efek Kilau Metalik Tipis */
            background: linear-gradient(135deg, #dcb05e 0%, #fff8e1 50%, #dcb05e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            filter: drop-shadow(0 0 1px rgba(255,255,255,0.2));
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        input:focus {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border: none;
            border-radius: 12px;
            color: #110905;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e5c158 0%, #ca961a 100%);
        }

        #error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            font-weight: 500;
            background: rgba(255, 0, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .success-box { display: none; }
        .success-text { color: #2ecc71; font-size: 22px; font-weight: bold; margin-bottom: 25px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container" id="main-box">
    
    <h1>MASDABIYANET</h1>
    
    <div id="login-form">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">Login</button>
        <p id="error-msg">Kamu Keliru Sandine Cak</p>
    </div>

    <div id="success-form" class="success-box">
        <p class="success-text">Sukses Cak!</p>
        <button onclick="goToRouter()">LANJUT</button>
    </div>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const loginForm = document.getElementById('login-form');
        const successForm = document.getElementById('success-form');

        if (user === "syifax" && pass === "masdabiyanet") {
            loginForm.style.display = "none";
            successForm.style.display = "block";
            errorMsg.style.display = "none";
        } else {
            errorMsg.style.display = "block";
            // Animasi getar sedikit
            const container = document.getElementById('main-box');
            container.style.transform = "translateX(-8px)";
            setTimeout(() => container.style.transform = "translateX(8px)", 100);
            setTimeout(() => container.style.transform = "translateX(0)", 200);
        }
    }

    function goToRouter() {
        window.location.href = "http://192.168.1.1";
    }
</script>

</body>
</html>
