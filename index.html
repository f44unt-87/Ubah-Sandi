<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Premium - MASDABIYANET</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #1a110a 0%, #050302 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* --- CONTAINER UTAMA DENGAN ELECTRIC BORDER --- */
        .electric-box {
            position: relative;
            width: 380px;
            padding: 3px; /* Jarak untuk border */
            background: rgba(212, 175, 55, 0.1);
            border-radius: 25px;
            overflow: hidden; /* Memotong bagian animasi yang keluar */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animasi Garis Elektrik Berputar */
        .electric-box::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #d4af37);
            animation: rotate 3s linear infinite;
        }

        /* Animasi Garis Elektrik Kedua (Opsional untuk efek lebih terang) */
        .electric-box::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #ffea00);
            animation: rotate 3s linear infinite;
            animation-delay: -1.5s;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Konten di dalam kotak agar tidak tertutup animasi */
        .login-container {
            position: relative;
            background: #1a110a; /* Warna solid agar animasi di belakang tidak bocor */
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 22px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        /* --- TULISAN 3D ELEGAN --- */
        h1 {
            font-size: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            margin-top: 0;
            color: #dcb05e;
            text-shadow: 
                0 1px 0 #b18e47, 0 2px 0 #9c7c3d, 0 3px 0 #896a33, 0 4px 0 #75592a,
                0 6px 1px rgba(0,0,0,0.5), 0 10px 10px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #dcb05e 0%, #fff8e1 50%, #dcb05e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffea00;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border: none;
            border-radius: 12px;
            color: #110905;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5);
        }

        #error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            font-weight: 500;
        }

        .success-box { display: none; }
        .success-text { color: #2ecc71; font-size: 22px; font-weight: bold; margin-bottom: 25px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="electric-box" id="outer-box">
    <div class="login-container">
        <h1>MASDABIYANET</h1>
        
        <div id="login-form">
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Login</button>
            <p id="error-msg">Kamu Keliru Sandine Cak</p>
        </div>

        <div id="success-form" class="success-box">
            <p class="success-text">Sukses Cak!</p>
            <button onclick="goToRouter()">LANJUT</button>
        </div>
    </div>
</div>

<script>
    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        if (u === "syifax" && p === "masdabiyanet") {
            document.getElementById('login-form').style.display = "none";
            document.getElementById('success-form').style.display = "block";
            document.getElementById('error-msg').style.display = "none";
        } else {
            document.getElementById('error-msg').style.display = "block";
        }
    }

    function goToRouter() {
        window.location.href = "http://192.168.1.1";
    }
</script>

</body>
</html>
